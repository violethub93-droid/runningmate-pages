<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>러닝메이트 — 2차 테스트</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#05070B;color:#EAEDF4;font-family:"Noto Sans KR",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{width:100%;max-width:400px;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#6B7FA3;font-weight:500}
  h1{font-size:26px;font-weight:700;margin:6px 0 6px;font-family:"Space Grotesk",sans-serif}
  .sub{font-size:13px;color:#8A93A6;margin-bottom:32px;line-height:1.6}
  .cards{display:grid;gap:14px}
  .card{display:block;text-decoration:none;background:#141A26;border:1px solid #26303F;border-radius:20px;padding:22px 24px;text-align:left;transition:border-color .2s,background .2s}
  .card:hover{border-color:#FF8A5B;background:#1A1410}
  .card.friend:hover{border-color:#4FD1A8;background:#0E1E18}
  .tag{display:inline-block;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px;margin-bottom:8px}
  .coach-tag{color:#FF8A5B;background:#3A2A24;border:1px solid #5A3A2A}
  .friend-tag{color:#4FD1A8;background:#1C3330;border:1px solid #2A5A48}
  .card h2{font-size:18px;font-weight:600;margin-bottom:4px;font-family:"Space Grotesk",sans-serif}
  .card p{font-size:13px;color:#8A93A6;line-height:1.5}
  .note{margin-top:24px;font-size:11.5px;color:#6B7FA3;line-height:1.7;background:#141A26;border:1px solid #26303F;border-radius:12px;padding:12px 16px;text-align:left}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="eyebrow">러닝메이트 · 2차 현장 테스트</div>
  <h1>자동 트리거 러닝</h1>
  <p class="sub">페르소나를 선택하고 달려보세요.<br>실제 GPS + 클로바더빙 음성으로 자동 코칭됩니다.</p>
  <div class="cards">
    <a class="card" href="runningmate_v2_coach.html">
      <span class="tag coach-tag">🧘 코치형</span>
      <h2>차분한 코치</h2>
      <p>안정적이고 차분한 톤으로 페이스를 잡아줘요.<br>말투: 존댓말 · 기술 중심 조언</p>
    </a>
    <a class="card friend" href="runningmate_v2_friend.html">
      <span class="tag friend-tag">🤝 친구형</span>
      <h2>에너제틱 친구</h2>
      <p>밝고 친근한 말투로 옆에서 같이 뛰는 느낌이에요.<br>말투: 반말 · 감성 응원</p>
    </a>
  </div>
  <div class="note">
    ⚡ <b>GPS 사용 팁</b><br>
    브라우저 주소창에서 자물쇠 → 위치 허용.<br>
    실내에서는 시뮬레이션 버튼으로 먼저 확인하세요.<br>
    발화 로그가 아래에 실시간으로 쌓여요.
  </div>
</div>
</body>
</html>
